<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador Dev</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <link rel="icon" href="./assets/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <section class="header-img">
        <img src="./assets/img/sort.png" Alt="Sorteador-Img" class="capa">
    </section>

    <section class="sorteador">

        <h1 class="title">Sortear um número</h1>
        <input type="number" class="min" placeholder="Valor min">
        <input type="number" class="max" placeholder="Valor máx">

        <div class="botao">
            <button onclick="sortear()" class="btn">Sortear</button>
        </div>
    </section>

</body>

</html>
